# https://taskfile.dev
version: "3"

tasks:
  default:
    deps: [build]

  build:
    desc: "Build the sesam binary"
    aliases:
      - build-cli
    vars:
      # Last reachable tag (+commits-since), or a bare hash when untagged.
      # Commit and date come from the toolchain's embedded VCS stamps.
      VERSION:
        sh: git describe --tags --always
    cmds:
      - cmd: CGO_ENABLED=0 go build -ldflags "-s -w -X github.com/open-sesam/sesam/cli.version={{.VERSION}}" -o sesam .
    sources:
      - ./*.go
      - ./**/*.go
      - Taskfile.yml
    generates:
      - ./sesam
    method: checksum

  test:
    desc: Run go tests
    cmds:
      - gotestsum --format testname -- -parallel 20 ./...

  coverage:
    desc: Run go tests with coverage report
    cmds:
      - go test -coverpkg=./... -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out

  # TODO: Build an docker image for CI + also for end users.

  lint:
    desc: Run the linter
    cmds:
      - pkill -9 -f golangci || true
      - golangci-lint run -c linter.yml

  fmt:
    desc: Format all Go sources via gofumpt
    cmds:
      - gofumpt -w -extra .

  docgen:
    desc: Generate all reference docs (CLI + config)
    deps: [docgen:cli, docgen:cfg]

  docgen:cli:
    desc: Generate CLI reference markdown from live command tree
    deps: [build]
    cmds:
      - ./sesam docgen > docs/src/cli_ref.md
    sources:
      - ./sesam
      - cli/**/*.go
    generates:
      - docs/src/cli_ref.md

  docgen:cfg:
    desc: Generate config reference markdown from sesam_schema.json
    cmds:
      - go run ./tools/cfgdocgen > docs/src/config_ref.md
    sources:
      - config/sesam_schema.json
      - tools/cfgdocgen/**
    generates:
      - docs/src/config_ref.md

  vuln:
    desc: Scan dependencies and stdlib usage for known vulnerabilities (govulncheck)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  docs:
    desc: Builds docs
    deps: [docgen]
    cmds:
      - cd docs && mdbook serve --open

  changelog:
    desc: Regenerate CHANGELOG.md from conventional-commit history
    cmds:
      - git-cliff -o CHANGELOG.md

  unreleased:
    desc: Preview the unreleased changelog section without writing the file
    cmds:
      - git-cliff --unreleased
