# https://taskfile.dev
version: "3"

tasks:
  default:
    deps: [build]

  build:
    desc: "Build the sesam binary"
    aliases:
      - build-cli
    cmds:
      - cmd: go build -o sesam .
    sources:
      - ./*.go
      - ./**/*.go
      - Taskfile.yml
    generates:
      - ./sesam
    method: checksum

  test:
    desc: Run go tests
    cmds:
      - go run gotestsum --format testname -- -parallel 20 ./...

  coverage:
    desc: Run go tests with coverage report
    cmds:
      - go test -coverpkg=./... -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out

  # TODO: Build an docker image for CI + also for end users.

  lint:
    desc: Run the linter
    cmds:
      - pkill -9 -f golangci || true
      - golangci-lint run -c linter.yml

  fmt:
    desc: Format all Go sources via gofumpt
    cmds:
      - gofumpt -w -extra .

  docgen:
    desc: Generate CLI reference markdown from live command tree
    deps: [build]
    cmds:
      - ./sesam docgen > docs/src/cli_ref.md
    sources:
      - ./sesam
      - cli/**/*.go
    generates:
      - docs/src/cli_ref.md

  vuln:
    desc: Scan dependencies and stdlib usage for known vulnerabilities (govulncheck)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  docs:
    desc: Builds docs
    deps: [docgen]
    cmds:
      - cd docs && mdbook serve --open

  changelog:
    desc: Regenerate CHANGELOG.md from conventional-commit history
    cmds:
      - git-cliff -o CHANGELOG.md

  unreleased:
    desc: Preview the unreleased changelog section without writing the file
    cmds:
      - git-cliff --unreleased
