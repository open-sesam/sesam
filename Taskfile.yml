# https://taskfile.dev
version: "3"

tasks:
  default:
    deps: [build]

  build:
    desc: "Build the sesam binary"
    aliases:
      - build-cli
    cmds:
      - cmd: go build -o sesam .
    sources:
      - ./*.go
      - ./**/*.go
      - Taskfile.yml
    generates:
      - ./sesam
    method: checksum

  test:
    desc: Run go tests
    cmds:
      - go run gotest.tools/gotestsum@v1.10.1 -- -parallel 20 ./...

  # TODO: Build an docker image for CI + also for end users.
