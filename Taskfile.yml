# https://taskfile.dev
version: "3"

tasks:
  default:
    deps: [build-amd64]

  _build:
    desc: "Build the sesam binary"
    vars:
      VERSION:
        sh: git describe --tags --always
    cmds:
      - cmd: CGO_ENABLED=0 GOARCH={{.GOARCH}} GOOS={{.GOOS}} go build -ldflags "-s -w -X github.com/open-sesam/sesam/cli.version={{.VERSION}}" -o sesam .
    sources:
      - ./*.go
      - ./**/*.go
      - Taskfile.yml
    generates:
      - ./sesam
    method: checksum

  build-arm64:
    cmds:
      - task: _build
        vars:
          GOOS: linux
          GOARCH: arm64

  build-amd64:
    aliases:
      - build
    cmds:
      - task: _build
        vars:
          GOOS: linux
          GOARCH: amd64

  test:
    desc: Run go tests
    cmds:
      - gotestsum --format testname -- ./...

  coverage:
    desc: Run go tests with coverage report
    cmds:
      - go test -coverpkg=./... -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out
      - go tool cover -html=coverage.out

  lint:
    desc: Run the linter
    cmds:
      - pkill -9 -f golangci || true
      - golangci-lint run -c linter.yml

  fmt:
    desc: Format all Go sources via gofumpt
    cmds:
      - gofumpt -w -extra .

  docgen:
    desc: Generate all reference docs (CLI + config)
    deps: [docgen:cli, docgen:cfg]

  docgen:cli:
    desc: Generate CLI reference markdown from live command tree
    deps: [build]
    cmds:
      - ./sesam docgen cli > docs/src/cli_ref.md
    sources:
      - ./sesam
      - cli/**/*.go
    generates:
      - docs/src/cli_ref.md

  docgen:cfg:
    desc: Generate config reference markdown from sesam_schema.json
    deps: [build]
    cmds:
      - ./sesam docgen config > docs/src/config_ref.md
    sources:
      - ./sesam
      - config/sesam_schema.json
      - cli/commands/docgen_cfg_template.md
    generates:
      - docs/src/config_ref.md

  vuln:
    desc: Scan dependencies and stdlib usage for known vulnerabilities (govulncheck)
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  docs:
    desc: Builds docs
    deps: [docgen]
    cmds:
      - cd docs && mdbook serve --open

  changelog:
    desc: Regenerate CHANGELOG.md from conventional-commit history
    cmds:
      - git-cliff -o CHANGELOG.md

  unreleased:
    desc: Preview the unreleased changelog section without writing the file
    cmds:
      - git-cliff --unreleased

  tag:
    desc: "Create a signed, changelog-annotated release tag (task tag -- vX.Y.Z)"
    cmds:
      - cmd: |
          set -euo pipefail
          tag="{{.CLI_ARGS}}"
          case "$tag" in
            v[0-9]*) ;;
            *) echo "usage: task tag -- vX.Y.Z" >&2; exit 1 ;;
          esac
          # Render the unreleased section under the new version, then sign it
          # into the tag message. `task release` reuses this same text as the
          # release body, so `git show <tag>` and the GitHub release match.
          # --cleanup=verbatim: without it git drops every '#'-prefixed line as
          # a comment, stripping the "### Features" etc. markdown headers.
          git-cliff --unreleased --tag "$tag" --strip header | git tag -s --cleanup=verbatim "$tag" -F -
          echo "Created signed tag $tag. Review: git show $tag  |  Push: git push origin $tag"

  release:
    desc: "Build, sign and publish a release locally (task release -- vX.Y.Z)"
    cmds:
      - cmd: |
          set -euo pipefail
          tag="{{.CLI_ARGS}}"
          case "$tag" in
            v[0-9]*) ;;
            *) echo "usage: task release -- vX.Y.Z" >&2; exit 1 ;;
          esac

          # Release only from a clean, signed tag that lives on main.
          [ -z "$(git status --porcelain)" ] || { echo "working tree is dirty" >&2; exit 1; }
          # git merge-base --is-ancestor "$tag" main || { echo "$tag is not reachable from main" >&2; exit 1; }
          # Verify against the committed maintainers list rather than the user's
          # global git config: tag-signing keys (author's) stay separate from
          # the release-artifact key, and no per-machine setup is required.
          git -c gpg.ssh.allowedSignersFile=release/allowed_signers verify-tag "$tag"

          # Multi-arch images need QEMU emulation and a buildx builder.
          docker run --privileged --rm tonistiigi/binfmt --install all
          docker buildx use sesam-release 2>/dev/null || docker buildx create --name sesam-release --use

          # Credentials live only on this machine; nothing is stored in CI.
          export GITHUB_TOKEN="$(gh auth token)"
          gh auth token | docker login ghcr.io -u "$(gh api user --jq .login)" --password-stdin

          # Reuse the signed tag's message as the release body (see `task tag`).
          notes="$(mktemp)"
          trap 'rm -f "$notes"' EXIT
          git tag -l --format='%(contents)' "$tag" > "$notes"
          goreleaser release --clean --release-notes "$notes"

          # Publish the tag so the GitHub release attaches to it (idempotent).
          git push origin "$tag"
