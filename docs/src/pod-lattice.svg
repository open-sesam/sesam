<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28">
  <!-- Diagonal lattice pattern inspired by the sesame pod surface -->
  <defs>
    <style>
      .mesh { stroke: #fff; stroke-width: 0.6; fill: none; opacity: 0.08; }
    </style>
  </defs>
  <!-- Diagonal grid lines (two directions) -->
  <line class="mesh" x1="0" y1="0" x2="12" y2="14"/>
  <line class="mesh" x1="12" y1="0" x2="24" y2="14"/>
  <line class="mesh" x1="0" y1="14" x2="12" y2="28"/>
  <line class="mesh" x1="12" y1="14" x2="24" y2="28"/>
  <line class="mesh" x1="12" y1="0" x2="0" y2="14"/>
  <line class="mesh" x1="24" y1="0" x2="12" y2="14"/>
  <line class="mesh" x1="12" y1="14" x2="0" y2="28"/>
  <line class="mesh" x1="24" y1="14" x2="12" y2="28"/>
  <!-- Horizontal connectors -->
  <line class="mesh" x1="0" y1="0" x2="24" y2="0"/>
  <line class="mesh" x1="0" y1="14" x2="24" y2="14"/>
  <line class="mesh" x1="0" y1="28" x2="24" y2="28"/>
  <!-- Seed shapes at intersections -->
  <ellipse class="mesh" cx="12" cy="7" rx="4" ry="5.5"/>
  <ellipse class="mesh" cx="0" cy="7" rx="4" ry="5.5"/>
  <ellipse class="mesh" cx="24" cy="7" rx="4" ry="5.5"/>
  <ellipse class="mesh" cx="0" cy="21" rx="4" ry="5.5"/>
  <ellipse class="mesh" cx="12" cy="21" rx="4" ry="5.5"/>
  <ellipse class="mesh" cx="24" cy="21" rx="4" ry="5.5"/>
</svg>
