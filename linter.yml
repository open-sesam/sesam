version: "2"

run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: false

formatters:
  disable-all: true
  enable:
    - gofumpt

linters:
  disable-all: true
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - nilnil
    - nolintlint
    - noctx
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - inline
        - shadow
    revive:
      ignore-generated-header: true
      severity: warning
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
      text: "G101|G404"