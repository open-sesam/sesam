# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: "sesam"

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

checksum:
  name_template: "checksums.txt"

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: sesam
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/open-sesam/sesam/cli.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    # Explicit file list: GoReleaser's default also bundles CHANGELOG*, which
    # made the changelog ship as an archive file. The changelog belongs in the
    # GitHub release body (via --release-notes), not inside the tarball.
    files:
      - README.md
      - LICENSE

# Sign checksums.txt with the project SSH key (managed by sesam itself:
# encrypted at rest in git, present as plaintext in the working tree via the
# smudge filter). Signing the checksum file covers every artifact it lists.
# ssh-keygen writes the signature to <artifact>.sig. Verify with the committed
# allowed_signers file:
#   ssh-keygen -Y verify -f allowed_signers.txt -I <signer-identity> \
#     -n sesam-release -s checksums.txt.sig < checksums.txt
signs:
  - id: checksum
    artifacts: checksum
    cmd: ssh-keygen
    args:
      - -Y
      - sign
      - -f
      - "secrets/release_signing.key"
      - -n
      - "sesam-release"
      - "${artifact}"
    signature: "${artifact}.sig"

dockers_v2:
  - images:
      - "ghcr.io/open-sesam/sesam"
    tags:
      - "{{ .Tag }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    annotations:
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.created": "{{ .Date }}"

# Release notes are produced by git-cliff (see .github/workflows/cd.yml) and
# passed via --release-notes, so GoReleaser's own changelog is disabled.
changelog:
  disable: true
