name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up tools
        uses: jdx/mise-action@v4

      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: task lint

      - name: Run tests
        run: task test

      # Render release notes for the pushed tag from conventional-commit
      # history; GoReleaser's own changelog is disabled in .goreleaser.yml.
      # git-cliff is offline (see cliff.toml), so no token is needed. Write
      # outside the repo: GoReleaser refuses to release from a dirty tree, and
      # an untracked RELEASE_NOTES.md at the repo root would count as dirty.
      - name: Generate release notes
        run: git-cliff --latest --strip header -o "$RUNNER_TEMP/RELEASE_NOTES.md"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
