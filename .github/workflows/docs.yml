name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "cli/**"
      - "Taskfile.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for mdbook-gitinfo

      - name: Set up mdBook and preprocessors
        uses: jdx/mise-action@v4
        with:
          install_args: "mdbook cargo:mdbook-admonish cargo:mdbook-pagetoc cargo:mdbook-gitinfo"

      - name: Cache mdbook build
        id: book-cache
        uses: actions/cache@v4
        with:
          path: docs/book
          key: book-${{ runner.os }}-${{ hashFiles('docs/src/**', 'docs/book.toml', 'docs/theme/**') }}-${{ github.sha }}
          restore-keys: |
            book-${{ runner.os }}-${{ hashFiles('docs/src/**', 'docs/book.toml', 'docs/theme/**') }}-

      - name: Build docs
        if: steps.book-cache.outputs.cache-hit != 'true'
        run: cd docs && mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
