name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up tools
        uses: jdx/mise-action@v4

      - name: Cache Go modules and build
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint
        run: task lint

      - name: Test
        run: task test

      # Builds the linux/amd64 + linux/arm64 binaries and the multi-arch Docker
      # image through the exact release config. --snapshot never publishes, so
      # drift in .goreleaser.yml is caught on PRs rather than at tag time.
      - name: GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sesam-dist
          path: dist/*.tar.gz
